info:
  name: 01-create-aggregate
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/{{deql_org_id}}/dereg/definitions"
  body:
    type: text
    data: |-
      -- LetŌĆÖs create an aggregate boundary for our Employee domain.
      -- It will process two commands: hire and promote.

      CREATE OR REPLACE AGGREGATE Employee;

      CREATE COMMAND HireEmployee (
        employee_id STRING,
        name        STRING,
        grade       STRING
      );

      CREATE OR REPLACE COMMAND PromoteEmployee (
        employee_id STRING,
        new_grade   STRING
      );

      -- We need business logic that can allow or reject hiring and promotions.
      -- So weŌĆÖll register two events and decisions which write events.

      CREATE OR REPLACE EVENT EmployeeHired (
        name  STRING,
        grade STRING
      );

      CREATE OR REPLACE  EVENT EmployeePromoted (
        new_grade STRING
      );

      CREATE OR REPLACE DECISION Hire
      FOR Employee
      ON COMMAND HireEmployee
      EMIT AS
        SELECT EVENT EmployeeHired (
          name  := :name,
          grade := :grade
        );
      /* An employee should only be promoted when the new grade is different from their current grade. */
      CREATE DECISION Promote
      FOR Employee
      ON COMMAND PromoteEmployee
      STATE AS
        SELECT
          LAST(
            CASE
              WHEN event_type = 'EmployeeHired'     THEN data.grade
              WHEN event_type = 'EmployeePromoted' THEN data.new_grade
              ELSE NULL
            END
          ) AS current_grade
        FROM DeReg."Employee$Events"
        WHERE stream_id = :employee_id
      EMIT AS
        SELECT EVENT EmployeePromoted (
          new_grade := :new_grade
        )
        WHERE :new_grade <> current_grade;

      -- Finally, we need read-only reports:
      -- a new-hire report for Finance/Admin, and a promotions report for Accounts.
      -- So weŌĆÖll create two projections.

      CREATE OR REPLACE PROJECTION NewHireReport AS
      SELECT
        stream_id AS employee_id,
        LAST(data.name)  AS name,
        LAST(data.grade) AS hired_grade
      FROM DeReg."Employee$Events"
      WHERE event_type = 'EmployeeHired'
      GROUP BY stream_id;

      CREATE OR REPLACE PROJECTION PromotionsReport AS
      SELECT
        stream_id AS employee_id,
        seq,
        data.new_grade AS promoted_to
      FROM DeReg."Employee$Events"
      WHERE event_type = 'EmployeePromoted'
      ORDER BY employee_id, seq;
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
