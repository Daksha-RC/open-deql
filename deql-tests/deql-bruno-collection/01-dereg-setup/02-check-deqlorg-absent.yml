info:
  name: "02-Check-DeqlOrg-Absent"
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/organizations"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Fail the test if an organization named 'deqlorg' exists in the returned list
        const orgs = Array.isArray(res.body && res.body.data) ? res.body.data : [];
        const exists = orgs.some(o => (o.name || o.identifier) === 'deqlorg');
        if (exists) {
          console.error('Check failed: organization "deqlorg" already exists');
          throw new Error('Precheck failed: organization "deqlorg" already exists');
        } else {
          console.log('Check passed: deqlorg not present');
        }

  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Pre-check that `deqlorg` does not exist. If it exists, this test fails and prevents subsequent create step.
