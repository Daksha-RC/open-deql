opencollection: 1.0.0

info:
  name: deql-bruno-collection
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: basic
    username: "{{ZO_ROOT_USER_EMAIL}}"
    password: "{{ZO_ROOT_USER_PASSWORD}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
