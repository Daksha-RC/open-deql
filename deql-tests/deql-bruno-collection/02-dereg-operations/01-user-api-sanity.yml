info:
  name: 02-user-api-sanity
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/{{deql_org_id}}/users"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
