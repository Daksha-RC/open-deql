info:
  name: 11-Get-Dereg-Metrics
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/{{deql_org_id}}/dereg/metrics"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Retrieve deregistration metrics. Uses collection-level basic auth (inherited).
